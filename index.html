<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Калькулятор резервуаров (рабочий)</title>
    <style>
        body { font-family: sans-serif; background: #1e3c72; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; border-radius: 32px; padding: 24px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
        select, input { width: 100%; padding: 6px; }
        button { margin: 5px; padding: 8px 16px; background: #1e3c72; color: white; border: none; border-radius: 20px; cursor: pointer; }
        .remove-btn { background: #c00; }
        .total { background: #e0f0e8; padding: 15px; margin-top: 20px; border-radius: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h2>Журнал наполнения резервуаров</h2>
    <table id="opsTable">
        <thead><tr><th>Резервуар</th><th>Уровень ДО (см)</th><th>Уровень ПОСЛЕ (см)</th><th>Добавлено (л)</th><th></th></tr></thead>
        <tbody id="opsBody"></tbody>
    </table>
    <button id="addBtn">➕ Добавить операцию</button>
    <button id="calcBtn">📊 Рассчитать всё</button>
    <div id="results" class="total" style="display:none;"></div>
</div>

<script>
    // Только основные точки для экономии места, но интерполяция будет работать
    const tanks = {
        "114.1": {0:3, 50:1744, 100:4525, 150:7430, 200:9722, 206:9907},
        "114.2": {0:3, 50:1747, 100:4509, 150:7402, 200:9734, 206:9926},
        "114.3": {0:1, 50:1790, 100:4587, 150:7497, 200:9821, 206:9950},
        "114.4": {0:3, 50:1738, 100:4519, 150:7447, 200:9767, 206:9894},
        "70.3":  {0:3, 50:1739, 100:4495, 150:7362, 200:9651, 204:9778},
        "71.1":  {0:1, 50:1772, 100:4523, 150:7399, 200:9704, 204:9829},
        "71.2":  {0:3, 50:1748, 100:4539, 150:7475, 200:9809, 204:9936}
    };

    // Функция линейной интерполяции по ключевым точкам
    function getVolume(height, data) {
        if (height < 0) return 0;
        let points = Object.keys(data).map(Number).sort((a,b)=>a-b);
        if (height >= points[points.length-1]) return data[points[points.length-1]];
        for (let i = 0; i < points.length-1; i++) {
            let h1 = points[i], h2 = points[i+1];
            if (height >= h1 && height <= h2) {
                let v1 = data[h1], v2 = data[h2];
                return v1 + (v2 - v1) * (height - h1) / (h2 - h1);
            }
        }
        return 0;
    }

    // Создание строки таблицы
    function createRow() {
        const tr = document.createElement('tr');
        const td1 = document.createElement('td');
        const select = document.createElement('select');
        for (let name in tanks) {
            let opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name;
            select.appendChild(opt);
        }
        td1.appendChild(select);
        const td2 = document.createElement('td');
        const inpBefore = document.createElement('input');
        inpBefore.type = 'number';
        inpBefore.step = 'any';
        td2.appendChild(inpBefore);
        const td3 = document.createElement('td');
        const inpAfter = document.createElement('input');
        inpAfter.type = 'number';
        inpAfter.step = 'any';
        td3.appendChild(inpAfter);
        const td4 = document.createElement('td');
        td4.className = 'result-cell';
        td4.textContent = '—';
        const td5 = document.createElement('td');
        const delBtn = document.createElement('button');
        delBtn.textContent = '✖';
        delBtn.className = 'remove-btn';
        delBtn.onclick = () => tr.remove();
        td5.appendChild(delBtn);
        tr.append(td1, td2, td3, td4, td5);
        return tr;
    }

    const body = document.getElementById('opsBody');
    body.appendChild(createRow()); // первая строка

    document.getElementById('addBtn').onclick = () => body.appendChild(createRow());
    document.getElementById('calcBtn').onclick = () => {
        const rows = document.querySelectorAll('#opsBody tr');
        let resultText = '';
        let tankTotals = {};
        let grandTotal = 0;
        for (let row of rows) {
            const select = row.querySelector('select');
            const before = parseFloat(row.querySelector('input:first-of-type').value);
            const after = parseFloat(row.querySelector('input:last-of-type').value);
            const resCell = row.querySelector('.result-cell');
            if (isNaN(before) || isNaN(after)) {
                resCell.textContent = 'Ошибка';
                continue;
            }
            const tank = select.value;
            const volBefore = getVolume(before, tanks[tank]);
            const volAfter = getVolume(after, tanks[tank]);
            const diff = volAfter - volBefore;
            resCell.textContent = diff.toFixed(1) + ' л';
            resultText += `${tank}: ${before} → ${after} = ${diff.toFixed(1)} л<br>`;
            tankTotals[tank] = (tankTotals[tank] || 0) + diff;
            grandTotal += diff;
        }
        let summary = '<h3>Результаты по операциям</h3>' + resultText;
        summary += '<h3>Суммарно по резервуарам</h3>';
        for (let [t, s] of Object.entries(tankTotals)) {
            summary += `${t}: ${s.toFixed(1)} л<br>`;
        }
        summary += `<h2>ОБЩИЙ ОБЪЁМ: ${grandTotal.toFixed(1)} л</h2>`;
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = summary;
        resultsDiv.style.display = 'block';
    };
</script>
</body>
</html>
